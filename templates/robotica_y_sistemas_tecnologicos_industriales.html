<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robótica y Sistemas Tecnológicos Industriales</title>
    <style>
        body {
                font-family: Arial, sans-serif;
                background-color: #131313;
                margin: 0;
                padding: 0;
                }
        
        .boton-enlace {
                display: inline-block;
                padding: 10px 20px;
                background-color: #ffdd00;
                color: black;
                text-decoration: none;
                border-radius: 5px;
                font-family: Arial, sans-serif;
                font-weight: bold;
                transition: background-color 0.3s ease;
                }

        .boton-enlace:hover {
                background-color: #0056b3;
                }
        .container {
                background-color: #2e2e2e;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                }
        .content {
                text-align: center;
                }
        #btn-curiosidad {
    background-color: #f39c12; /* Un color naranja llamativo */
    color: white;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s;
}

#btn-curiosidad:hover {
    transform: scale(1.05);
    background-color: #e67e22;
}

#texto-curiosidad {
    background: #fff8e1;
    padding: 10px;
    border-left: 5px solid #f39c12;
    border-radius: 4px;
    animation: fadeIn 0.5s;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>
<body>
    <div class="container">
        <div class="content">
<div class="curiosidad-container">
    <button id="btn-curiosidad">¿Sabías que...?</button>
    <p id="texto-curiosidad" style="display:none; font-style: italic; color: #555; margin-top: 10px;"></p>
</div>
    <a class="boton-enlace" href="./fisica_aplicada.html">Ir al Quiz de Física Aplicada</a>
    </div>
    </div>
</body>
</html>
